name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Swift app ────────────────────────────────────────────────────────────
  swift:
    name: Swift Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build --target Rack --target rack

      - name: Build (release)
        run: swift build -c release --target Rack --target rack

  # ── Rust bridge ─────────────────────────────────────────────────────────
  rust:
    name: Rust Build
    runs-on: macos-15
    env:
      CARGO_TARGET_DIR: .build/rust

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/rust/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (debug)
        run: cargo build --manifest-path Sources/rack-bridge/Cargo.toml

      - name: Build (release, universal binary)
        run: |
          cargo build --release --target aarch64-apple-darwin --manifest-path Sources/rack-bridge/Cargo.toml
          cargo build --release --target x86_64-apple-darwin --manifest-path Sources/rack-bridge/Cargo.toml
          lipo -create \
            .build/rust/aarch64-apple-darwin/release/rack-bridge \
            .build/rust/x86_64-apple-darwin/release/rack-bridge \
            -output .build/rack-bridge-universal

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: rack-bridge-universal
          path: .build/rack-bridge-universal

      - name: Clippy
        run: cargo clippy --manifest-path Sources/rack-bridge/Cargo.toml -- -D warnings

      - name: Format check
        run: cargo fmt --manifest-path Sources/rack-bridge/Cargo.toml -- --check
